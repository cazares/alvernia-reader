<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Alvernia" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Alvernia Reader" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="description" content="Manual Alvernia con lector simple y navegacion rapida." />
    <title>Alvernia Reader</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon-192.png" />
    <link rel="apple-touch-icon" href="./icon-512.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="viewer-shell" id="viewer-shell">
        <img id="page-image" alt="Pagina actual del manual" />
        <div class="loading" id="loading">Cargando...</div>
      </section>

      <section class="overlay-controls" id="overlay-controls">
        <div class="navigation-numberpad" id="navigation-numberpad">
          <p class="numberpad-eyebrow">Navegacion</p>
          <p class="numberpad-status" id="page-status">Pagina 1 de 1</p>
          <input
            class="numberpad-display"
            id="page-display"
            type="text"
            inputmode="none"
            readonly
            value=""
            placeholder="Numero de pagina"
            aria-label="Numero de pagina"
          />

          <div class="numberpad-grid" id="numberpad-grid" aria-label="Navigation numberpad">
            <button class="numberpad-key" type="button" data-digit="1">1</button>
            <button class="numberpad-key" type="button" data-digit="2">2</button>
            <button class="numberpad-key" type="button" data-digit="3">3</button>
            <button class="numberpad-key" type="button" data-digit="4">4</button>
            <button class="numberpad-key" type="button" data-digit="5">5</button>
            <button class="numberpad-key" type="button" data-digit="6">6</button>
            <button class="numberpad-key" type="button" data-digit="7">7</button>
            <button class="numberpad-key" type="button" data-digit="8">8</button>
            <button class="numberpad-key" type="button" data-digit="9">9</button>
            <button class="numberpad-key numberpad-key-muted" id="clear-button" type="button">C</button>
            <button class="numberpad-key" type="button" data-digit="0">0</button>
            <button class="numberpad-key numberpad-key-muted" id="backspace-button" type="button">Borrar</button>
          </div>

          <button class="go-button" id="go-button" type="button">Ir</button>
        </div>

        <footer class="overlay-actions" id="overlay-actions">
          <button class="nav-button" id="prev-page" type="button" aria-label="Pagina anterior">Anterior</button>
          <button class="nav-button nav-button-primary" id="fullscreen-button" type="button" aria-label="Pantalla completa">
            ⛶ Pantalla completa
          </button>
          <button class="nav-button" id="next-page" type="button" aria-label="Pagina siguiente">Siguiente</button>
        </footer>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
