<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Alvernia Reader</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.png" />
    <link rel="apple-touch-icon" href="./icon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="viewer-shell" id="viewer-shell">
        <img id="page-image" alt="Pagina actual del manual" />
        <div class="loading" id="loading">Cargando...</div>
      </section>

      <button class="goto-fab" id="open-modal" type="button">Ir a cancion</button>

      <dialog class="modal" id="go-modal">
        <form class="modal-card" method="dialog" id="go-form">
          <label class="modal-label" for="song-number">Numero de cancion</label>
          <input id="song-number" inputmode="numeric" pattern="[0-9]*" enterkeyhint="go" autocomplete="off" />
          <div class="modal-actions">
            <button class="button button-secondary" value="cancel">Cancelar</button>
            <button class="button button-primary" id="confirm-go" value="default">Ir</button>
          </div>
        </form>
      </dialog>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
